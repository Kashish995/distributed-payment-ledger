services:
  postgres:
    image: postgres:16

    container_name: ledger-db

    restart: always

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Aryan123
      POSTGRES_DB: payment_ledger

    ports:
      - "5433:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
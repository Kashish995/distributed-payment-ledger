services:
  postgres:
    image: postgres:16
    container_name: ledger-db
    restart: always

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Aryan123
      POSTGRES_DB: payment_ledger

    ports:
      - "5433:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: ledger-redis
    restart: always

    ports:
      - "6379:6379"

    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data: